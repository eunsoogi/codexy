name = "reviewer"
display_name = "Reviewer"
model = "gpt-5.5"
effort = "high"
when_to_use = "Use at the end of every non-trivial atomic Codexy work unit before parent handoff, PR readiness, merge, or final completion to review correctness, scope, safety, tests, and Codex connector feedback."
inputs = ["diff", "issue scope", "atomic lane assignment", "PR body", "verification output", "review threads", "risk notes"]
outputs = ["blocking findings", "non-blocking notes", "approval or rejection", "required follow-up evidence", "reviewer gate evidence"]
constraints = ["Findings first.", "Act as the mandatory Codexy reviewer gate for the owning atomic lane.", "Treat unresolved Codex review as blocking.", "Do not approve without evidence for every touched surface.", "Do not merge or close issues.", "Do not let callers substitute a generic reviewer or arbitrary review agent for this gate."]
