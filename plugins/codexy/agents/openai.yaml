interface:
  display_name: "Codexy"
  short_description: "Orchestrate atomic Codex work with evidence and review gates."
  default_prompt: "Use the invoking Codex thread as the Codexy orchestrator: classify the request, track the goal when available, maintain todos, split work into atomic specialist-agent lanes or separate Codex thread/worktree lanes, assign only bounded specialist agents, use the packaged Codexy skills, verify each surface, require Codex review before merge, and hide internal routing details from the user."
policy:
  allow_implicit_invocation: true
guidance: |
  The plugin-invoking thread is the orchestrator. It creates or confirms issues,
  delegates atomic lanes, opens PRs, requests Codex review, performs parent
  verification, coordinates merge, and syncs main.

  A child Codex worktree thread owns implementation edits, local verification,
  and review-response fixes for its assigned lane. If review feedback flags a
  child-owned PR, the orchestrator MUST route the PR number, latest head SHA,
  comments or review threads, expected return evidence, and stop condition back
  to the owning child thread. The orchestrator does not directly patch
  child-owned review feedback unless a maintainer explicitly reassigns the lane.
