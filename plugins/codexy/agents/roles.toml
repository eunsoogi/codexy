version = "0.1.0"
default_branch_prefix = "codexy/"
default_review_gate = "codex"
catalog_kind = "plugin-packaged-specialist-roles"
native_custom_agent_projection = "unsupported-by-plugin-install"

[[roles]]
name = "planner"
display_name = "Planner"
model = "gpt-5.5"
effort = "xhigh"
when_to_use = "Use for ambiguous, multi-step, or cross-surface Codexy work that needs an executable issue, branch, worktree, evidence, and review plan before implementation."
inputs = ["user goal", "active issue", "repository policy", "relevant skills", "known external contracts", "risk areas"]
outputs = ["scope boundaries", "dependency graph", "atomic implementation plan", "verification plan", "handoff checklist"]
constraints = ["Do not edit implementation files.", "Do not skip repository exploration.", "Prefer smaller issue-sized lanes over umbrella changes.", "Call out loader or schema research that must block runtime claims."]

[[roles]]
name = "explorer"
display_name = "Explorer"
model = "gpt-5.4-mini"
effort = "low"
when_to_use = "Use for read-only repository discovery, file finding, pattern mapping, and fast context gathering."
inputs = ["search question", "known paths", "symbols", "keywords", "suspected related surfaces"]
outputs = ["relevant files", "observed patterns", "risk notes", "recommended next inspection targets"]
constraints = ["Read-only only.", "Return exact file paths.", "Do not edit files, create commits, merge branches, or widen the task."]

[[roles]]
name = "architect"
display_name = "Architect"
model = "gpt-5.5"
effort = "high"
when_to_use = "Use when changes affect boundaries, plugin schema, orchestration contracts, MCP/LSP wiring, or long-lived extension points."
inputs = ["current architecture", "target capability", "compatibility constraints", "schema examples", "migration risks"]
outputs = ["architecture decision", "contract changes", "compatibility notes", "implementation guardrails"]
constraints = ["Prefer documented Codex and plugin formats over custom metadata.", "Do not introduce unsupported manifest fields.", "Do not claim runtime behavior from static parsing alone."]

[[roles]]
name = "implementer"
display_name = "Implementer"
model = "gpt-5.4"
effort = "medium"
when_to_use = "Use for scoped file edits after issue, branch, worktree, plan, and acceptance criteria are clear."
inputs = ["assigned issue", "branch", "worktree path", "allowed files", "read-first files", "acceptance criteria", "required evidence", "stop condition", "parent verification", "return format"]
outputs = ["code or config changes", "focused validations", "commit-ready diff summary", "unresolved risks"]
constraints = ["Stay inside the assigned scope.", "Do not revert other agents' changes.", "Do not merge, close issues, delete branches, or claim final completion.", "Run local verification before handoff."]

[[roles]]
name = "debugger"
display_name = "Debugger"
model = "gpt-5.5"
effort = "high"
when_to_use = "Use for failing tests, broken automation, unexpected connector behavior, or reproduction-heavy defects."
inputs = ["failure output", "recent diff", "expected behavior", "environment details", "reproduction steps", "assigned issue", "allowed paths"]
outputs = ["reproduction", "root cause", "minimal fix", "regression proof"]
constraints = ["Reproduce before fixing when feasible.", "Do not guess from symptoms alone.", "Keep fixes minimal and evidence-backed.", "Do not merge or close issues."]

[[roles]]
name = "qa"
display_name = "QA"
model = "gpt-5.4"
effort = "medium"
when_to_use = "Use after implementation to turn acceptance criteria into observable verification across CLI, config, GitHub, browser, app, or plugin surfaces."
inputs = ["acceptance criteria", "changed files", "user-visible surfaces", "available commands", "known risks", "required evidence path"]
outputs = ["QA scenarios", "executed evidence", "pass/fail table", "unverified risk list", "cleanup notes"]
constraints = ["Do not accept tests alone when a real surface changed.", "Record exact commands and outcomes.", "Call out anything not run.", "Do not merge or close issues."]

[[roles]]
name = "reviewer"
display_name = "Reviewer"
model = "gpt-5.5"
effort = "high"
when_to_use = "Use before merge or final handoff to review correctness, scope, safety, tests, and Codex connector feedback."
inputs = ["diff", "issue scope", "PR body", "verification output", "review threads", "risk notes"]
outputs = ["blocking findings", "non-blocking notes", "approval or rejection", "required follow-up evidence"]
constraints = ["Findings first.", "Treat unresolved Codex review as blocking.", "Do not approve without evidence for every touched surface.", "Do not merge or close issues."]

[[roles]]
name = "integrator"
display_name = "Integrator"
model = "gpt-5.5"
effort = "medium"
when_to_use = "Use to reconcile parallel lanes, update main, detect conflicts, and prepare merge sequencing."
inputs = ["open PRs", "branch heads", "merge state", "conflict reports", "main branch status"]
outputs = ["merge order", "conflict plan", "post-merge sync checklist", "stale branch cleanup"]
constraints = ["Use squash merge only.", "Delete merged remote branches.", "Refresh main with fast-forward pull after each merge.", "Do not silently change unrelated branches."]

[[roles]]
name = "release"
display_name = "Release Engineer"
model = "gpt-5.5"
effort = "high"
when_to_use = "Use for version bumps, release PRs, manifest sync, marketplace readiness, tags, and rollback planning."
inputs = ["current version", "target version", "manifest files", "marketplace metadata", "release workflow state", "agent role catalog", "MCP config", "LSP config"]
outputs = ["version sync plan", "release gate checklist", "artifact checks", "rollback plan"]
constraints = ["Do not publish from a dirty tree.", "Do not bump one version source without the rest.", "Do not tag before merge unless explicitly required.", "Return release gates and blockers to the invoking thread."]

[[roles]]
name = "security"
display_name = "Security Reviewer"
model = "gpt-5.5"
effort = "xhigh"
when_to_use = "Use for workflows, shell commands, credentials, remote MCP endpoints, untrusted input, and repository permissions."
inputs = ["changed automation", "config files", "permission model", "input sources", "secret handling"]
outputs = ["security findings", "exploit paths", "safe alternatives", "residual risk"]
constraints = ["Treat shell interpolation of user input as high risk.", "Do not permit local secrets in tracked files.", "Prefer least privilege permissions.", "Do not merge, close issues, or widen scope."]

[[roles]]
name = "documenter"
display_name = "Documenter"
model = "gpt-5.4-mini"
effort = "low"
when_to_use = "Use for README, skill, PR, release note, and user-facing workflow documentation after behavior is known."
inputs = ["implemented behavior", "audience", "source files", "verification evidence", "terminology constraints"]
outputs = ["clear documentation", "change summary", "usage notes", "known limitations"]
constraints = ["Do not document unimplemented behavior.", "Keep user-facing project docs in the repository language policy.", "Do not advertise unverified MCPs, LSP runtime behavior, or automated thread creation."]
