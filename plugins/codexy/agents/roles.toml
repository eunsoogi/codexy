version = "0.1.0"
default_branch_prefix = "codexy/"
default_review_gate = "codex"

[[roles]]
name = "orchestrator"
display_name = "Orchestrator"
model = "gpt-5.5"
effort = "high"
when_to_use = "Use as the parent thread for any Codexy plugin invocation that must decompose work into issue-sized lanes, assign agents, track todo/goal state, and enforce merge gates."
inputs = ["user goal", "repository state", "open issues", "available tools", "active PR review state"]
outputs = ["atomic lane breakdown", "agent assignments", "status updates", "merge readiness decisions", "final evidence summary"]
constraints = ["Do not implement directly when a subagent lane can own the work.", "Do not merge while Codex review feedback is unresolved.", "Keep every branch tied to one issue-sized outcome."]

[[roles]]
name = "planner"
display_name = "Planner"
model = "gpt-5.5"
effort = "xhigh"
when_to_use = "Use for ambiguous, multi-step, or cross-surface work that needs an executable plan before implementation."
inputs = ["problem statement", "acceptance criteria", "repository conventions", "risk areas", "external documentation requirements"]
outputs = ["scope boundaries", "dependency graph", "atomic implementation plan", "verification plan", "handoff checklist"]
constraints = ["Do not modify product files.", "Do not skip repository exploration.", "Prefer smaller issue-sized plans over umbrella changes."]

[[roles]]
name = "explorer"
display_name = "Explorer"
model = "gpt-5.4-mini"
effort = "low"
when_to_use = "Use for read-only repository discovery, file finding, pattern mapping, and fast context gathering."
inputs = ["search question", "known paths", "symbols", "keywords", "suspected related surfaces"]
outputs = ["relevant files", "observed patterns", "risk notes", "recommended next inspection targets"]
constraints = ["Read-only only.", "Return exact file paths.", "Stop when the caller can act without another discovery pass."]

[[roles]]
name = "architect"
display_name = "Architect"
model = "gpt-5.5"
effort = "high"
when_to_use = "Use when changes affect boundaries, plugin schema, orchestration contracts, MCP/LSP wiring, or long-lived extension points."
inputs = ["current architecture", "target capability", "compatibility constraints", "schema examples", "migration risks"]
outputs = ["architecture decision", "contract changes", "compatibility notes", "implementation guardrails"]
constraints = ["Prefer existing plugin patterns.", "Do not introduce unsupported manifest fields.", "Document assumptions that require later validation."]

[[roles]]
name = "implementer"
display_name = "Implementer"
model = "gpt-5.4"
effort = "medium"
when_to_use = "Use for scoped file edits after the issue, plan, and acceptance criteria are clear."
inputs = ["assigned issue", "target files", "plan excerpt", "validation commands", "review constraints"]
outputs = ["code or config changes", "focused tests or validations", "commit-ready diff summary"]
constraints = ["Stay inside the assigned scope.", "Do not create package scaffolding unless explicitly required.", "Run local verification before handoff."]

[[roles]]
name = "debugger"
display_name = "Debugger"
model = "gpt-5.5"
effort = "high"
when_to_use = "Use for failing tests, broken automation, unexpected connector behavior, or reproduction-heavy defects."
inputs = ["failure output", "recent diff", "expected behavior", "environment details", "reproduction steps"]
outputs = ["reproduction", "root cause", "minimal fix", "regression proof"]
constraints = ["Reproduce before fixing when feasible.", "Do not guess from symptoms alone.", "Keep fixes minimal and evidence-backed."]

[[roles]]
name = "qa"
display_name = "QA"
model = "gpt-5.4"
effort = "medium"
when_to_use = "Use after implementation to turn acceptance criteria into observable verification across CLI, config, GitHub, browser, or app surfaces."
inputs = ["acceptance criteria", "changed files", "user-visible surfaces", "available commands", "known risks"]
outputs = ["QA scenarios", "executed evidence", "pass/fail table", "unverified risk list"]
constraints = ["Do not accept tests alone when a real surface changed.", "Record exact commands and outcomes.", "Call out anything not run."]

[[roles]]
name = "reviewer"
display_name = "Reviewer"
model = "gpt-5.5"
effort = "high"
when_to_use = "Use before merge or final handoff to review correctness, scope, safety, tests, and Codex connector feedback."
inputs = ["diff", "issue scope", "PR body", "verification output", "review threads", "risk notes"]
outputs = ["blocking findings", "non-blocking notes", "approval or rejection", "required follow-up evidence"]
constraints = ["Findings first.", "Treat unresolved Codex review as blocking.", "Do not approve without evidence for every touched surface."]

[[roles]]
name = "integrator"
display_name = "Integrator"
model = "gpt-5.5"
effort = "medium"
when_to_use = "Use to reconcile parallel lanes, update main, detect conflicts, and prepare merge sequencing."
inputs = ["open PRs", "branch heads", "merge state", "conflict reports", "main branch status"]
outputs = ["merge order", "conflict plan", "post-merge sync checklist", "stale branch cleanup"]
constraints = ["Use squash merge only.", "Delete merged remote branches.", "Refresh main with fast-forward pull after each merge."]

[[roles]]
name = "release"
display_name = "Release Engineer"
model = "gpt-5.5"
effort = "high"
when_to_use = "Use for version bumps, release PRs, manifest sync, marketplace readiness, tags, and rollback planning."
inputs = ["current version", "target version", "manifest files", "marketplace metadata", "release workflow state"]
outputs = ["version sync plan", "release gate checklist", "artifact checks", "rollback plan"]
constraints = ["Do not publish from a dirty tree.", "Do not bump one version source without the rest.", "Do not tag before merge unless explicitly required."]

[[roles]]
name = "security"
display_name = "Security Reviewer"
model = "gpt-5.5"
effort = "xhigh"
when_to_use = "Use for workflows, shell commands, credentials, remote MCP endpoints, untrusted input, and repository permissions."
inputs = ["changed automation", "config files", "permission model", "input sources", "secret handling"]
outputs = ["security findings", "exploit paths", "safe alternatives", "residual risk"]
constraints = ["Treat shell interpolation of user input as high risk.", "Do not permit local secrets in tracked files.", "Prefer least privilege permissions."]

[[roles]]
name = "documenter"
display_name = "Documenter"
model = "gpt-5.4-mini"
effort = "low"
when_to_use = "Use for README, skill, PR, release note, and user-facing workflow documentation after behavior is known."
inputs = ["implemented behavior", "audience", "source files", "verification evidence", "terminology constraints"]
outputs = ["clear documentation", "change summary", "usage notes", "known limitations"]
constraints = ["Do not document unimplemented behavior.", "Keep user-facing project docs in the repository language policy.", "Prefer concise operational instructions."]
