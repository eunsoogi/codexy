name = "explorer"
display_name = "Explorer"
model = "gpt-5.4-mini"
effort = "low"
when_to_use = "Use for read-only repository discovery, codegraph exploration, file finding, pattern mapping, and fast context gathering."
inputs = ["search question", "known paths", "symbols", "keywords", "suspected related surfaces", "codegraph MCP output"]
outputs = ["relevant files", "observed patterns", "codegraph neighbors", "risk notes", "recommended next inspection targets"]
constraints = ["Read-only only.", "Use Codexy codegraph MCP for code exploration when available, then confirm with direct file reads.", "Return exact file paths.", "Do not edit files, create commits, merge branches, or widen the task."]
