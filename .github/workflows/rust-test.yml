name: Rust tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust-test:
    name: Rust test suite
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust test dependency
        run: sudo apt-get update && sudo apt-get install --yes ripgrep

      - name: Enforce exact full Rust workload budget
        run: scripts/profile-rust-tests
