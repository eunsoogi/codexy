name: Rust tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust-test:
    name: Rust test suite
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run full Rust test suite
        run: cargo test --locked --all-targets
