name: Publish verified getcodexy bootstrap

on:
  workflow_dispatch:
    inputs:
      bootstrap_version:
        description: "Unpublished getcodexy version to publish, for example 1.3.0"
        required: true
        type: string
      source_commit:
        description: "Exact immutable source commit to build"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/getcodexy
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_commit }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify immutable bootstrap identity
        env:
          BOOTSTRAP_VERSION: ${{ inputs.bootstrap_version }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
        run: |
          test "$(git rev-parse HEAD)" = "$SOURCE_COMMIT"
          version="$(python -c 'import tomllib; print(tomllib.load(open("packages/getcodexy/pyproject.toml", "rb"))["project"]["version"])')"
          test "$version" = "$BOOTSTRAP_VERSION"
      - name: Build and publish bootstrap package
        run: |
          python -m pip install --disable-pip-version-check build
          python -m build --outdir dist packages/getcodexy
      - uses: pypa/gh-action-pypi-publish@release/v1
      - name: Prove public wheel and source distribution availability
        env:
          BOOTSTRAP_VERSION: ${{ inputs.bootstrap_version }}
        run: |
          attempt=0
          until curl --fail --silent --show-error --location "https://pypi.org/pypi/getcodexy/${BOOTSTRAP_VERSION}/json" -o pypi.json; do
            attempt=$((attempt + 1))
            test "$attempt" -lt 12 || exit 1
            sleep 10
          done
          BOOTSTRAP_VERSION="$BOOTSTRAP_VERSION" python3 - <<'PY' > public-artifacts.tsv
          import json, os
          document = json.load(open("pypi.json", encoding="utf-8"))
          if document["info"]["version"] != os.environ["BOOTSTRAP_VERSION"]:
              raise SystemExit("PyPI version mismatch")
          files = document["urls"]
          for package_type in ("bdist_wheel", "sdist"):
              matches = [item for item in files if item["packagetype"] == package_type]
              if len(matches) != 1:
                  raise SystemExit(f"expected one public {package_type}, got {len(matches)}")
              item = matches[0]
              print(package_type, item["url"], item["digests"]["sha256"], sep="\t")
          PY
          while IFS="$(printf '\t')" read -r package_type url digest; do
            curl --fail --silent --show-error --location "$url" -o "public-${package_type}"
            printf '%s  %s\n' "$digest" "public-${package_type}" | sha256sum -c -
          done < public-artifacts.tsv
      - name: Prove clean public bootstrap install
        env:
          BOOTSTRAP_VERSION: ${{ inputs.bootstrap_version }}
        run: |
          python -m venv public-bootstrap
          public-bootstrap/bin/python -m pip install --index-url https://pypi.org/simple "getcodexy==${BOOTSTRAP_VERSION}"
          public-bootstrap/bin/codexy-mcp-runtime --help
