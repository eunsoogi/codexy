name: Touched LOC gate

on:
  pull_request:

permissions:
  contents: read

jobs:
  touched-loc:
    name: Validate touched implementation LOC
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}"

      - name: Validate touched implementation LOC
        run: scripts/validate-plugin-config --check-touched-loc --base-ref "origin/${{ github.base_ref }}"
