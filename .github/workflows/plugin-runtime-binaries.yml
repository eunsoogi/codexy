name: Verify selected marketplace runtime package

on:
  pull_request:
    paths:
      - "plugins/codexy/**"
      - ".agents/plugins/**"
      - "scripts/inspect-release-archive"
      - "scripts/validate-plugin-config"
      - ".github/workflows/plugin-runtime-binaries.yml"
  push:
    branches: [main]
    paths:
      - "plugins/codexy/**"
      - ".agents/plugins/**"
      - "scripts/inspect-release-archive"
      - "scripts/validate-plugin-config"
      - ".github/workflows/plugin-runtime-binaries.yml"

permissions:
  contents: read

jobs:
  verify-selected-package:
    name: Verify ${{ matrix.platform }} selected package
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
          - platform: darwin-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Download and verify selected immutable bytes
        run: |
          url="$(jq -r .artifact.url plugins/codexy/runtime-release.json)"
          digest="$(jq -r .artifact.sha256 plugins/codexy/runtime-release.json)"
          mkdir -p dist
          curl --fail --location "$url" -o dist/selected.tar.gz
          sha256sum dist/selected.tar.gz | grep "$digest"
      - name: Assemble state-aware marketplace package without rebuilding
        run: |
          state="$(jq -r .state plugins/codexy/runtime-release.json)"
          case "$state" in
            legacy-public)
              mkdir -p dist/legacy dist/final/plugins
              tar -xzf dist/selected.tar.gz -C dist/legacy \
                plugins/codexy/runtime/codexy-mcp-lsp-darwin-arm64.bin \
                plugins/codexy/runtime/codexy-mcp-codegraph-darwin-arm64.bin \
                plugins/codexy/runtime/codexy-mcp-lsp-linux-x86_64.bin \
                plugins/codexy/runtime/codexy-mcp-codegraph-linux-x86_64.bin
              staged=dist/final/plugins/codexy
              rsync -a --exclude runtime --exclude runtime-candidate.json plugins/codexy/ "$staged/"
              mkdir -p "$staged/runtime"
              for platform in darwin-arm64 linux-x86_64; do
                for server in lsp codegraph; do
                  path="runtime/codexy-mcp-${server}-${platform}.bin"
                  digest="$(jq -r ".platforms[\"$platform\"][\"$server\"].sha256" plugins/codexy/runtime-release.json)"
                  test "$(sha256sum "dist/legacy/plugins/codexy/$path" | awk '{print $1}')" = "$digest"
                  cp "dist/legacy/plugins/codexy/$path" "$staged/$path"
                  cmp "dist/legacy/plugins/codexy/$path" "$staged/$path"
                done
              done
              test ! -e "$staged/runtime-candidate.json"
              tar -C dist/final -czf dist/codexy-marketplace-plugin.tar.gz plugins/codexy
              scripts/inspect-release-archive dist/codexy-marketplace-plugin.tar.gz "$staged"
              ;;
            candidate-proven)
              mkdir -p dist/candidate dist/final/plugins
              tar -xzf dist/selected.tar.gz -C dist/candidate \
                plugins/codexy/runtime-candidate.json \
                plugins/codexy/runtime/codexy-mcp-lsp-darwin-arm64.bin \
                plugins/codexy/runtime/codexy-mcp-codegraph-darwin-arm64.bin \
                plugins/codexy/runtime/codexy-mcp-lsp-linux-x86_64.bin \
                plugins/codexy/runtime/codexy-mcp-codegraph-linux-x86_64.bin
              candidate=dist/candidate/plugins/codexy
              staged=dist/final/plugins/codexy
              test ! -e "$candidate/runtime-release.json"
              test "$(sha256sum "$candidate/runtime-candidate.json" | awk '{print $1}')" = "$(jq -r .artifact.payloadManifestSha256 plugins/codexy/runtime-release.json)"
              rsync -a --exclude runtime --exclude runtime-candidate.json plugins/codexy/ "$staged/"
              mkdir -p "$staged/runtime"
              cp "$candidate/runtime-candidate.json" "$staged/runtime-candidate.json"
              for platform in darwin-arm64 linux-x86_64; do
                for server in lsp codegraph; do
                  path="$(jq -r ".platforms[\"$platform\"][\"$server\"].path" plugins/codexy/runtime-release.json)"
                  digest="$(jq -r ".platforms[\"$platform\"][\"$server\"].sha256" plugins/codexy/runtime-release.json)"
                  test "$path" = "runtime/codexy-mcp-${server}-${platform}.bin"
                  test "$(sha256sum "$candidate/$path" | awk '{print $1}')" = "$digest"
                  cp "$candidate/$path" "$staged/$path"
                  cmp "$candidate/$path" "$staged/$path"
                done
              done
              tar -C dist/final -czf dist/codexy-marketplace-plugin.tar.gz plugins/codexy
              scripts/inspect-release-archive dist/codexy-marketplace-plugin.tar.gz "$staged"
              ;;
            *) echo "unsupported runtime-release state: $state" >&2; exit 1 ;;
          esac
      - uses: actions/upload-artifact@v4
        with:
          name: codexy-marketplace-plugin
          path: dist/codexy-marketplace-plugin.tar.gz
          if-no-files-found: error
