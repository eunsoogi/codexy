name: Plugin version bump

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Target plugin version in MAJOR.MINOR.PATCH form"
        required: true
        type: string
      issue:
        description: "Open governing release issue number"
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  open-version-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pin working tree to main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Admit selected runtime version advance
        env:
          VERSION: ${{ inputs.version }}
        run: scripts/sync-plugin-version --admit-version "$VERSION"

      - name: Validate governing release issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ inputs.issue }}
          VERSION: ${{ inputs.version }}
        run: |
          case "$ISSUE" in
            ''|*[!0-9]*) echo "Issue must be a positive integer." >&2; exit 1 ;;
          esac
          if [ "$ISSUE" -lt 1 ]; then
            echo "Issue must be a positive integer." >&2
            exit 1
          fi
          state_dir="$RUNNER_TEMP/version-pr"
          mkdir -p "$state_dir"
          gh issue view "$ISSUE" --repo "$GITHUB_REPOSITORY" \
            --json number,state,url,labels,milestone,assignees > "$state_dir/issue.json"
          canonical_issue=$(scripts/canonicalize-version-pr-issue \
            --requested "$ISSUE" \
            --issue-json "$state_dir/issue.json" \
            --repository "$GITHUB_REPOSITORY")
          printf 'ISSUE=%s\n' "$canonical_issue" >> "$GITHUB_ENV"
          gh label list --repo "$GITHUB_REPOSITORY" --limit 100 \
            --json name > "$state_dir/repository-labels.json"
          scripts/render-version-pr-metadata \
            --version "$VERSION" \
            --issue-json "$state_dir/issue.json" \
            --repository-labels-json "$state_dir/repository-labels.json" \
            --publication-phase provisional \
            --validate-only

      - name: Synchronize plugin version
        env:
          VERSION: ${{ inputs.version }}
        run: scripts/sync-plugin-version --version "$VERSION"

      - name: Validate release candidate
        run: |
          scripts/sync-plugin-version --check
          scripts/validate-plugin-config --check
          cargo test --locked
          git diff --check

      - name: Open version bump pull request
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: scripts/reconcile-version-pr
