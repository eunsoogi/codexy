name: Plugin version bump

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Target plugin version in MAJOR.MINOR.PATCH form"
        required: true
        type: string
      issue:
        description: "Open governing release issue number"
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  open-version-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pin working tree to main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate governing release issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ inputs.issue }}
          VERSION: ${{ inputs.version }}
        run: |
          case "$ISSUE" in
            ''|*[!0-9]*) echo "Issue must be a positive integer." >&2; exit 1 ;;
          esac
          if [ "$ISSUE" -lt 1 ]; then
            echo "Issue must be a positive integer." >&2
            exit 1
          fi
          state_dir="$RUNNER_TEMP/version-pr"
          mkdir -p "$state_dir"
          gh issue view "$ISSUE" --repo "$GITHUB_REPOSITORY" \
            --json number,state,url,labels,milestone,assignees > "$state_dir/issue.json"
          gh label list --repo "$GITHUB_REPOSITORY" --limit 100 \
            --json name > "$state_dir/repository-labels.json"
          scripts/render-version-pr-metadata \
            --version "$VERSION" \
            --issue-json "$state_dir/issue.json" \
            --repository-labels-json "$state_dir/repository-labels.json" \
            --publication-phase provisional \
            --validate-only

      - name: Synchronize plugin version
        env:
          VERSION: ${{ inputs.version }}
        run: scripts/sync-plugin-version --version "$VERSION"

      - name: Validate release candidate
        run: |
          scripts/sync-plugin-version --check
          scripts/validate-plugin-config --check
          cargo test --locked
          git diff --check

      - name: Open version bump pull request
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ inputs.issue }}
          VERSION: ${{ inputs.version }}
        run: |
          if git diff --quiet; then
            scripts/plan-version-pr-reconciliation \
              --has-changes false --pr-count 0 --remote-exists false \
              --pr-matches-origin false
            echo "Version is already synchronized to ${VERSION}."
            exit 0
          fi
          state_dir="$RUNNER_TEMP/version-pr"
          branch="codexy/version-${VERSION}"
          owner=${GITHUB_REPOSITORY%%/*}
          name=${GITHUB_REPOSITORY#*/}
          git diff --name-only --diff-filter=ACMRTUXB > "$state_dir/changed-files.txt"
          git diff --name-only -z --diff-filter=ACMRTUXB > "$state_dir/changed-files.z"
          refresh_version_pr_snapshot() {
            gh issue view "$ISSUE" --repo "$GITHUB_REPOSITORY" \
              --json number,state,url,labels,milestone,assignees > "$state_dir/issue.json"
            gh label list --repo "$GITHUB_REPOSITORY" --limit 100 \
              --json name > "$state_dir/repository-labels.json"
            scripts/render-version-pr-metadata \
              --version "$VERSION" \
              --issue-json "$state_dir/issue.json" \
              --repository-labels-json "$state_dir/repository-labels.json" \
              --publication-phase provisional \
              --validate-only
          }
          render_version_pr_metadata() {
            phase=$1
            scripts/render-version-pr-metadata \
              --version "$VERSION" \
              --issue-json "$state_dir/issue.json" \
              --repository-labels-json "$state_dir/repository-labels.json" \
              --changed-files-file "$state_dir/changed-files.txt" \
              --output-dir "$state_dir/metadata" \
              --publication-phase "$phase"
          }
          publish_version_pr_metadata() {
            phase=$1
            render_version_pr_metadata "$phase"
            title=$(sed -n '1p' "$state_dir/metadata/title.txt")
            gh api --method PUT \
              "repos/$GITHUB_REPOSITORY/issues/$pr_number/labels" \
              --input "$state_dir/metadata/labels.json" > "$state_dir/applied-labels.json"
            gh pr edit "$pr_number" --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --body-file "$state_dir/metadata/body.md"
          }
          publication_phase=$(scripts/plan-version-pr-reconciliation \
            --publication-phase --release-candidate-passed true \
            --labels-checked false --completion-handoff-checked false \
            --merge-message-checked false)

          gh api --method GET "repos/$GITHUB_REPOSITORY/pulls" \
            -f state=open -f head="$owner:$branch" \
            --jq '[.[] | {number, headRefOid: .head.sha, headRepository: .head.repo.full_name, headLabel: .head.label}]' \
            > "$state_dir/existing-prs.json"
          pr_count=$(jq 'length' "$state_dir/existing-prs.json")
          remote_exists=false
          if git ls-remote --exit-code --heads origin "refs/heads/$branch" >/dev/null; then
            remote_exists=true
          fi
          pr_matches_origin=false
          remote_oid=""
          if [ "$remote_exists" = true ]; then
            git fetch origin "$branch:refs/remotes/origin/$branch"
            remote_oid=$(git rev-parse "origin/$branch")
            if [ "$pr_count" -eq 1 ] && jq -e \
              --arg repository "$GITHUB_REPOSITORY" \
              --arg label "$owner:$branch" \
              --arg oid "$remote_oid" \
              '.[0] | .headRepository == $repository and .headLabel == $label and .headRefOid == $oid' \
              "$state_dir/existing-prs.json" >/dev/null; then
              pr_matches_origin=true
            fi
          fi
          pr_number=""
          if [ "$pr_count" -eq 1 ]; then
            pr_number=$(jq -r '.[0].number' "$state_dir/existing-prs.json")
          fi
          refresh_version_pr_snapshot
          observed_pr_args=()
          if [ -n "$pr_number" ]; then
            gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" \
              --json number,body,headRefName,headRefOid,labels,closingIssuesReferences \
              > "$state_dir/observed-pr.json"
            observed_pr_args=(--observed-pr-json "$state_dir/observed-pr.json")
          fi
          action=$(scripts/plan-version-pr-reconciliation \
            --has-changes true --pr-count "$pr_count" --remote-exists "$remote_exists" \
            --pr-matches-origin "$pr_matches_origin" \
            --version "$VERSION" --repository "$GITHUB_REPOSITORY" \
            --issue-json "$state_dir/issue.json" "${observed_pr_args[@]}")

          expected_head_oid=""
          if [ "$action" != first-run ]; then
            expected_head_oid=$remote_oid
            git diff --binary --no-ext-diff > "$state_dir/expected.patch"
            git diff --binary --no-ext-diff origin/main..."origin/$branch" \
              > "$state_dir/remote.patch"
            if ! cmp -s "$state_dir/expected.patch" "$state_dir/remote.patch"; then
              echo "Existing ${branch} does not match the requested version changes." >&2
              exit 1
            fi
          fi
          render_version_pr_metadata "$publication_phase"
          title=$(sed -n '1p' "$state_dir/metadata/title.txt")
          plugins/codexy/hooks/codexy-pr-title-check.sh --pr-title "$title"

          if [ "$action" = first-run ]; then
            git switch -c "$branch"
            git add Cargo.toml Cargo.lock .agents/plugins/marketplace.json .agents/plugins/release-publish-contract.json plugins/codexy/.codex-plugin/plugin.json packages/getcodexy/pyproject.toml
            git add --pathspec-from-file="$state_dir/changed-files.z" --pathspec-file-nul
            git commit -m "chore(plugin): bump version to ${VERSION}"
            git push origin "$branch"
            expected_head_oid=$(git rev-parse HEAD)
            pr_url=$(gh pr create \
              --title "$title" \
              --body-file "$state_dir/metadata/body.md" \
              --base main \
              --head "$branch")
            pr_number=$(gh pr view "$pr_url" --repo "$GITHUB_REPOSITORY" \
              --json number --jq .number)
          else
            if [ "$action" = pushed-no-pr ]; then
              pr_url=$(gh pr create \
                --title "$title" \
                --body-file "$state_dir/metadata/body.md" \
                --base main \
                --head "$branch")
              pr_number=$(gh pr view "$pr_url" --repo "$GITHUB_REPOSITORY" \
                --json number --jq .number)
            else
              gh pr edit "$pr_number" --repo "$GITHUB_REPOSITORY" \
                --title "$title" \
                --body-file "$state_dir/metadata/body.md" \
                --base main
            fi
          fi

          refresh_version_pr_snapshot
          publish_version_pr_metadata "$publication_phase"
          gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" \
            --json number,state,isDraft,mergeStateStatus,reviewDecision,baseRefName,body,headRefName,headRefOid,headRepository,headRepositoryOwner,isCrossRepository,url,labels,closingIssuesReferences \
            > "$state_dir/pr-state.base.json"
          gh api graphql \
            -f owner="$owner" -f name="$name" -F number="$pr_number" -f query='query($owner:String!, $name:String!, $number:Int!) {
              repository(owner:$owner, name:$name) {
                pullRequest(number:$number) {
                  reviewThreads(first:100) {
                    pageInfo { hasNextPage endCursor }
                    nodes { id isResolved isOutdated path comments(first:20) { nodes { url } } }
                  }
                }
              }
            }' \
            --jq '.data.repository.pullRequest.reviewThreads' \
            > "$state_dir/review-threads.json"
          scripts/build-version-pr-state \
            --pr-json "$state_dir/pr-state.base.json" \
            --issue-json "$state_dir/issue.json" \
            --repository-labels-json "$state_dir/repository-labels.json" \
            --review-threads-json "$state_dir/review-threads.json" \
            --repository "$GITHUB_REPOSITORY" \
            --expected-head-ref "$branch" \
            --expected-head-oid "$expected_head_oid" \
            --output "$state_dir/pr-state.json"
          plugins/codexy/hooks/codexy-pr-label-check.sh \
            --pr-state-file "$state_dir/pr-state.json"
          cat > "$state_dir/handoff.md" <<EOF
          Verification completed: full release-candidate checks passed before mutation.
          PR #${pr_number} is open for CI and review. This automation does not claim completion or merge readiness.
          EOF
          scripts/validate-plugin-config --check-completion-handoff \
            --handoff-file "$state_dir/handoff.md" \
            --pr-state-file "$state_dir/pr-state.json"
          merge_subject="${title} (#${pr_number})"
          printf '%s\n\n' "$merge_subject" > "$state_dir/merge-message.txt"
          cat "$state_dir/metadata/body.md" >> "$state_dir/merge-message.txt"
          plugins/codexy/hooks/codexy-merge-message-check.sh \
            --expected-pr "$pr_number" \
            --expected-issue "$ISSUE" \
            --merge-message-file "$state_dir/merge-message.txt"
          publication_phase=$(scripts/plan-version-pr-reconciliation \
            --publication-phase --release-candidate-passed true \
            --labels-checked true --completion-handoff-checked true \
            --merge-message-checked true)
          publish_version_pr_metadata "$publication_phase"
          cat "$state_dir/handoff.md" >> "$GITHUB_STEP_SUMMARY"
