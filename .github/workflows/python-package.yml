name: Check getcodexy bootstrap package

on:
  pull_request:
    paths:
      - "packages/getcodexy/**"
      - ".github/workflows/python-package.yml"
      - ".github/workflows/bootstrap-package.yml"
  push:
    branches: [main]
    paths:
      - "packages/getcodexy/**"
      - ".github/workflows/python-package.yml"
      - ".github/workflows/bootstrap-package.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Run focused package tests
        run: PYTHONPATH=packages/getcodexy/src python -m unittest discover -s packages/getcodexy/tests -p 'test_*.py'
      - name: Build distribution
        run: |
          python -m pip install --disable-pip-version-check build
          python -m build --outdir dist packages/getcodexy
      - name: Verify installed wheel and console entrypoint
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("packages/getcodexy/pyproject.toml", "rb"))["project"]["version"])')"
          python -m venv .package-venv
          .package-venv/bin/python -m pip install --no-index --find-links dist "getcodexy==${version}"
          .package-venv/bin/python -c 'import codexy_runtime_tools'
          .package-venv/bin/codexy-mcp-runtime --help
      - uses: actions/upload-artifact@v7
        with:
          name: getcodexy-bootstrap-package
          path: dist/*
          if-no-files-found: error
