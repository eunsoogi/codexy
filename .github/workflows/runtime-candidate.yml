name: Publish immutable runtime candidate

on:
  workflow_dispatch:
    inputs:
      candidate_tag:
        description: "New immutable runtime-candidate-* tag"
        required: true
        type: string
      source_commit:
        description: "Exact immutable source commit to build"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-runtime:
    name: Build ${{ matrix.platform }} candidate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
          - platform: darwin-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_commit }}
          fetch-depth: 0
          persist-credentials: false
      - name: Verify exact source commit
        env:
          SOURCE_COMMIT: ${{ inputs.source_commit }}
        run: test "$(git rev-parse HEAD)" = "$SOURCE_COMMIT"
      - name: Build candidate MCP runtimes
        run: cargo build --release --locked --bin codexy-mcp-lsp --bin codexy-mcp-codegraph
      - name: Smoke platform-local MCP protocols
        run: |
          python3 - <<'PY'
          import json, subprocess

          def smoke(binary, tool, arguments):
              requests = [
                  {"jsonrpc": "2.0", "id": 1, "method": "initialize", "params": {}},
                  {"jsonrpc": "2.0", "id": 2, "method": "tools/call", "params": {"name": tool, "arguments": arguments}},
              ]
              completed = subprocess.run(
                  [binary],
                  input="\n".join(json.dumps(request) for request in requests) + "\n",
                  capture_output=True,
                  check=False,
                  text=True,
                  timeout=30,
              )
              if completed.returncode:
                  raise SystemExit(f"{binary} failed: {completed.stderr}")
              responses = {response["id"]: response for response in map(json.loads, completed.stdout.splitlines()) if "id" in response}
              expected = {"protocolVersion": "2024-11-05"}
              if responses[1]["result"]["protocolVersion"] != expected["protocolVersion"]:
                  raise SystemExit(f"{binary} protocol mismatch")
              if "error" in responses[2] or not responses[2]["result"]["content"]:
                  raise SystemExit(f"{binary} tool smoke failed: {responses[2]}")

          cases = [
              {"binary": "target/release/codexy-mcp-lsp", "name": "lsp_status", "arguments": {"root": ".", "path": "Cargo.toml"}},
              {"binary": "target/release/codexy-mcp-codegraph", "name": "codegraph_overview", "arguments": {"root": ".", "limit": 10}},
          ]
          for case in cases:
              smoke(case["binary"], case["name"], case["arguments"])
          PY
      - name: Package declared platform binaries
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          for server in lsp codegraph; do
            path="runtime/codexy-mcp-${server}-${PLATFORM}.bin"
            mkdir -p "$(dirname "$path")"
            cp "target/release/codexy-mcp-${server}" "$path"
            chmod 755 "$path"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: runtime-candidate-${{ matrix.platform }}
          path: runtime
          if-no-files-found: error

  publish-candidate:
    needs: build-runtime
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_commit }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/download-artifact@v4
        with:
          pattern: runtime-candidate-*
          path: staged-runtime
          merge-multiple: true
      - name: Assemble canonical candidate archive and receipt
        env:
          CANDIDATE_TAG: ${{ inputs.candidate_tag }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
        run: |
          case "$CANDIDATE_TAG" in runtime-candidate-?*) ;; *) exit 1;; esac
          slug="${CANDIDATE_TAG#runtime-candidate-}"
          case "$slug" in *[!A-Za-z0-9._-]*) exit 1;; esac
          test "$(git rev-parse HEAD)" = "$SOURCE_COMMIT"
          root=dist/candidate/plugins/codexy
          mkdir -p dist/candidate/plugins
          rsync -a --exclude runtime --exclude runtime-release.json --exclude runtime-candidate.json plugins/codexy/ "$root/"
          cp -R staged-runtime "$root/runtime"
          for platform in darwin-arm64 linux-x86_64; do
            for server in lsp codegraph; do
              chmod 755 "$root/runtime/codexy-mcp-${server}-${platform}.bin"
            done
          done
          CANDIDATE_TAG="$CANDIDATE_TAG" SOURCE_COMMIT="$SOURCE_COMMIT" ROOT="$root" python3 - <<'PY'
          import hashlib, json, os
          root = os.environ["ROOT"]
          platforms = {}
          for platform in ("darwin-arm64", "linux-x86_64"):
              inventory = {}
              for server in ("lsp", "codegraph"):
                  path = f"runtime/codexy-mcp-{server}-{platform}.bin"
                  data = open(f"{root}/{path}", "rb").read()
                  inventory[server] = {"path": path, "sha256": hashlib.sha256(data).hexdigest()}
              platforms[platform] = inventory
          candidate = {"schema":"codexy-runtime-candidate/v1","source":{"repository":"https://github.com/eunsoogi/codexy","commit":os.environ["SOURCE_COMMIT"]},"artifact":{"tag":os.environ["CANDIDATE_TAG"]},"compatibility":{"bootstrapApi":1,"pluginRuntimeApi":1,"transport":"stdio-newline-v1","mcpProtocol":"2024-11-05"},"platforms":platforms}
          open(f"{root}/runtime-candidate.json", "wb").write(json.dumps(candidate, sort_keys=True, separators=(",", ":")).encode())
          PY
          tar -C dist/candidate -czf dist/codexy-marketplace-plugin.tar.gz plugins/codexy
          archive_sha="$(sha256sum dist/codexy-marketplace-plugin.tar.gz | awk '{print $1}')"
          manifest_sha="$(sha256sum "$root/runtime-candidate.json" | awk '{print $1}')"
          CANDIDATE_TAG="$CANDIDATE_TAG" SOURCE_COMMIT="$SOURCE_COMMIT" ARCHIVE_SHA="$archive_sha" MANIFEST_SHA="$manifest_sha" python3 - <<'PY'
          import json, os
          candidate = json.load(open("dist/candidate/plugins/codexy/runtime-candidate.json"))
          receipt = {"schema":"codexy-runtime-candidate-receipt/v1","candidate":candidate,"artifact":{"url":f"https://github.com/eunsoogi/codexy/releases/download/{os.environ['CANDIDATE_TAG']}/codexy-marketplace-plugin.tar.gz","sha256":os.environ["ARCHIVE_SHA"],"payloadManifestSha256":os.environ["MANIFEST_SHA"]},"provenance":{"repositoryId":1269350143,"workflowPath":".github/workflows/runtime-candidate.yml","runId":int(os.environ["GITHUB_RUN_ID"]),"runAttempt":int(os.environ["GITHUB_RUN_ATTEMPT"]),"workflowRunUrl":f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"}}
          open("dist/runtime-candidate-receipt.json", "wb").write(json.dumps(receipt, sort_keys=True, separators=(",", ":")).encode())
          open("dist/runtime-candidate-provenance.json", "w", encoding="utf-8").write(json.dumps(receipt["provenance"], sort_keys=True, separators=(",", ":")))
          PY
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/codexy-marketplace-plugin.tar.gz
      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Create candidate tag and release once
        env:
          CANDIDATE_TAG: ${{ inputs.candidate_tag }}
          GH_TOKEN: ${{ github.token }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
        run: |
          remote_commit="$(git ls-remote --tags origin "refs/tags/$CANDIDATE_TAG^{}" | awk 'NR == 1 {print $1}')"
          if test -z "$remote_commit"; then
            remote_commit="$(git ls-remote --tags origin "refs/tags/$CANDIDATE_TAG" | awk 'NR == 1 {print $1}')"
          fi
          if test -z "$remote_commit"; then
            git tag -a "$CANDIDATE_TAG" -m "Runtime candidate $CANDIDATE_TAG" "$SOURCE_COMMIT"
            git push origin "$CANDIDATE_TAG"
            remote_commit="$SOURCE_COMMIT"
          fi
          test "$remote_commit" = "$SOURCE_COMMIT"
          if ! gh release view "$CANDIDATE_TAG" >/dev/null 2>&1; then
            gh release create "$CANDIDATE_TAG" --target "$SOURCE_COMMIT" --title "$CANDIDATE_TAG" --notes "Immutable runtime candidate."
          fi
          scripts/reconcile-runtime-candidate-assets dist
      - name: Re-download and verify anonymous public bytes
        env:
          CANDIDATE_TAG: ${{ inputs.candidate_tag }}
        run: |
          base="https://github.com/eunsoogi/codexy/releases/download/$CANDIDATE_TAG"
          curl --fail --location "$base/codexy-marketplace-plugin.tar.gz" -o public.tar.gz
          curl --fail --location "$base/runtime-candidate-receipt.json" -o public-receipt.json
          curl --fail --location "$base/runtime-candidate-provenance.json" -o public-provenance.json
          cmp dist/runtime-candidate-receipt.json public-receipt.json
          cmp dist/runtime-candidate-provenance.json public-provenance.json
          jq -cS .provenance public-receipt.json | tr -d '\n' > receipt-provenance.json
          cmp receipt-provenance.json public-provenance.json
          sha256sum public.tar.gz | grep "$(jq -r .artifact.sha256 public-receipt.json)"
          tar -xOf public.tar.gz plugins/codexy/runtime-candidate.json > public-candidate.json
          cmp dist/candidate/plugins/codexy/runtime-candidate.json public-candidate.json
          sha256sum public-candidate.json | grep "$(jq -r .artifact.payloadManifestSha256 public-receipt.json)"
